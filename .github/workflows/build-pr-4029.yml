name: Build cmux PR 4029 Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Exact source commit to build
        required: true
        default: 752dc4a6ae0540720abf261e4838e6c27787a096
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      CMUX_SKIP_ZIG_BUILD: "1"
    steps:
      - name: Checkout PR source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.source_ref }}
          submodules: recursive

      - name: Verify source commit
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ inputs.source_ref }}"
          git submodule status

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode.app/Contents/Developer ]; then
            xcode_dir=/Applications/Xcode.app/Contents/Developer
          else
            xcode_app="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1)"
            test -n "$xcode_app"
            xcode_dir="$xcode_app/Contents/Developer"
          fi
          test -d "$xcode_dir"
          echo "DEVELOPER_DIR=$xcode_dir" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$xcode_dir"
          xcodebuild -version

      - name: Install Zig
        run: ./scripts/install-zig-ci.sh

      - name: Download pre-built GhosttyKit.xcframework
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Build release app
        id: build
        run: |
          set -euo pipefail
          xcodebuild -scheme cmux -configuration Release \
            -derivedDataPath build-release \
            -destination 'generic/platform=macOS' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            build
          app_path="$PWD/build-release/Build/Products/Release/cmux.app"
          test -d "$app_path"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app_path/Contents/Info.plist")" = "0.64.4"

          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/cmuxd-remote-manifest.json" \
            https://github.com/manaflow-ai/cmux/releases/download/v0.64.4/cmuxd-remote-manifest.json
          manifest_json="$(python3 -c 'import json,sys; print(json.dumps(json.load(open(sys.argv[1], encoding="utf-8")), separators=(",", ":")))' "$RUNNER_TEMP/cmuxd-remote-manifest.json")"
          plutil -remove CMUXRemoteDaemonManifestJSON "$app_path/Contents/Info.plist" >/dev/null 2>&1 || true
          plutil -insert CMUXRemoteDaemonManifestJSON -string "$manifest_json" "$app_path/Contents/Info.plist"
          plutil -replace SUFeedURL -string https://github.com/manaflow-ai/cmux/releases/download/v0.64.4/appcast.xml "$app_path/Contents/Info.plist"

          /usr/bin/codesign --force --deep --sign - "$app_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
          mkdir -p artifact
          ditto -c -k --sequesterRsrc --keepParent "$app_path" artifact/cmux-pr-4029.app.zip
          {
            echo "source_commit=$(git rev-parse HEAD)"
            echo "app_path=$app_path"
            echo "app_bundle_id=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Contents/Info.plist")"
            echo "app_name=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleName' "$app_path/Contents/Info.plist")"
            echo "update_feed=$(/usr/libexec/PlistBuddy -c 'Print :SUFeedURL' "$app_path/Contents/Info.plist")"
            echo "auth_callback_scheme=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleURLTypes:1:CFBundleURLSchemes:0' "$app_path/Contents/Info.plist")"
            echo "remote_daemon_manifest_version=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["appVersion"])' "$RUNNER_TEMP/cmuxd-remote-manifest.json")"
          } > artifact/build-info.txt
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$app_path"
          /usr/bin/codesign -dvv "$app_path" 2> artifact/codesign.txt || true

      - name: Upload app
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmux-pr-4029
          path: artifact/
          retention-days: 14
          if-no-files-found: error
